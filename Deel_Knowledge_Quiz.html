and speed are mutually exclusive and cannot coexist in any role"], "correct": 0, "brief": "Optimizing for just one value is comparatively easy, move fast and don't worry about waste, or be careful and slow. Demanding both simultaneously, fast AND lean, is a harder standard because it removes the easy fallback of sacrificing one for the other, which is exactly why naming both together is a meaningfully tougher ask than either alone."}, {"q": "A rep gives a confident, SPECIFIC implementation timeline (e.g. 'exactly 2 weeks') before understanding a prospect's actual complexity. What's the deeper risk beyond just 'maybe being wrong'?", "opts": ["A broken specific promise damages trust more severely than a careful range would have, since it signals either dishonesty or a lack of real diligence in giving the estimate", "There is no deeper risk beyond simple inaccuracy", "Specific promises always increase trust regardless of accuracy", "This only matters if the prospect explicitly catches the discrepancy later"], "correct": 0, "brief": "The deeper risk isn't just being wrong, it's what being wrong implies. A broken specific promise suggests either the rep didn't actually know and guessed anyway (a diligence problem) or knew and said it anyway to close faster (a trust problem). A careful range, with a clear reason behind it, avoids creating that deeper doubt even if the eventual real timeline turns out similar."}, {"q": "Why might 'we need to loop in our COO' sometimes be a STRONGER buying signal than a typical authority objection, depending on context?", "opts": ["If escalation is driven by a stated urgent pain (lost candidates, compliance risk), it often means the problem is being taken seriously enough to act on, not stalled out of disinterest", "Authority objections are always a pure stalling tactic with no exceptions", "COOs are never involved in genuine operational decisions of this kind", "This phrase always means the deal is effectively dead"], "correct": 0, "brief": "The same words carry different meaning depending on what's driving them. If a real, urgent, already-admitted pain (like losing candidates to visa delays) is what's prompting the escalation, that's often a sign of momentum toward action, not stalling. Context, not just the literal objection, is what determines whether this signal is positive or negative."}, {"q": "Why is it considered a stronger interview answer to say 'I haven't had a real conflict with a manager, more a difference in point of view on priorities' than to either deny ever disagreeing OR invent a dramatic conflict story?", "opts": ["It's honest, specific, and shows real judgment (explaining reasoning, then respecting a manager's broader view) without either appearing falsely conflict-free or manufacturing unnecessary drama", "Dramatic conflict stories are always preferred by interviewers regardless of content", "Claiming zero disagreements ever is always the strongest possible answer", "This kind of nuanced answer is considered evasive and should be avoided"], "correct": 0, "brief": "Flatly denying any disagreement ever can sound unrealistic or evasive. Inventing unnecessary drama can raise concerns about how conflict-prone someone might be. A precise, honest middle answer, differences in priority view, handled by explaining reasoning and then respecting the manager's broader perspective, demonstrates real judgment without either extreme."}], "communication_skills": [{"q": "When asked 'tell me about yourself' in an interview, what's generally the strongest structure?", "opts": ["A focused career narrative ending on your most relevant recent achievement, not a full chronological list", "Reciting your CV exactly in order from your first job to today", "Only talking about your personal life and hobbies", "Asking the interviewer to read your CV instead"], "correct": 0, "brief": "A strong 'tell me about yourself' answer is a narrative, not a list. It should connect a few relevant roles into a coherent story and land on your most relevant recent achievement, giving the interviewer a natural hook to ask follow-up questions about, rather than a flat recitation of dates and titles."}, {"q": "What is generally considered a weak way to answer 'what's your biggest weakness'?", "opts": ["A disguised strength (e.g. 'I work too hard') with no real downside named", "A specific, real weakness with a learned fix and example", "A weakness tied to an early-career mistake you've since corrected", "An honest weakness relevant to the actual role"], "correct": 0, "brief": "Disguised-strength weaknesses ('I'm too much of a perfectionist,' 'I work too hard') are recognized immediately by experienced interviewers as evasive. They read as not actually answering the question, which often counts against the candidate more than a real, specific weakness would."}, {"q": "What does 'acknowledge, probe, respond' primarily help with in a conversation?", "opts": ["Handling a disagreement or objection calmly and accurately", "Memorizing a script word for word", "Speaking faster under pressure", "Avoiding eye contact during difficult conversations"], "correct": 0, "brief": "This sequence, acknowledge what was said, probe to understand the real concern, then respond to that real concern specifically, helps you avoid reacting to the surface complaint before understanding what's actually driving it. It works in interviews and live objection handling alike."}, {"q": "Why is naming a SPECIFIC example generally stronger than a general claim in an interview answer?", "opts": ["Specific examples are harder to fake and easier for the interviewer to evaluate and ask follow-up questions about", "General claims always sound more impressive than specific ones", "Specific examples are required by law in formal interviews", "Interviewers prefer answers with no concrete detail at all"], "correct": 0, "brief": "A general claim ('I'm a hard worker') is essentially unfalsifiable and forgettable. A specific example ('I rebuilt my daily workflow after falling behind, and was ahead of target within two weeks') is memorable, credible, and gives the interviewer something concrete to probe further if they want to."}, {"q": "When discussing a past mistake or weakness, what generally makes the story land well?", "opts": ["A clear arc: what happened, what you learned, what changed as a result", "Only describing the mistake with no resolution at all", "Blaming a colleague or manager for the mistake", "Minimizing the mistake so it doesn't sound real"], "correct": 0, "brief": "A mistake story without a resolution just sounds like an unresolved flaw. The strongest version has a clear arc, what happened, what you learned, and what concretely changed afterward, which turns an admission of fault into evidence of growth and self-awareness."}, {"q": "What's a strong reason to ask the interviewer a thoughtful question at the end of an interview?", "opts": ["It signals genuine interest and engagement, beyond just wanting to be hired", "It's purely a formality with no real impact on perception", "Questions at the end are considered rude in most interview contexts", "It's only relevant for very senior-level roles"], "correct": 0, "brief": "A thoughtful, specific question (not a generic 'do you have any questions for me' filler) signals you've been actively thinking throughout the conversation, not just waiting for your turn to answer. It's one of the few moments in an interview where you control the topic, which makes it worth using deliberately."}, {"q": "Why might closing a call with a SPECIFIC next step and date ('I'll follow up Thursday') be stronger than a vague close ('I'll follow up soon')?", "opts": ["Specific commitments are easier to hold both parties accountable to and signal genuine intent to follow through", "Vague closes are always preferred because they create less pressure", "Specific dates are only relevant for very large deals", "There's no meaningful difference between the two phrasings"], "correct": 0, "brief": "'Soon' is easy to forget and easy to deprioritize internally for the prospect. A specific date creates a real, checkable commitment for both sides, and signals that you're organized and intend to genuinely follow through, not just saying something polite to end the call."}, {"q": "What's the risk of using filler phrases like 'um,' 'basically,' or 'you know' excessively during an interview?", "opts": ["It can make confident, well-prepared answers sound less polished and less credible, even if the content itself is strong", "Filler words have no measurable effect on how an answer is perceived", "Filler words are required to sound natural and should be used deliberately", "This only matters in written communication, not spoken interviews"], "correct": 0, "brief": "Occasional filler is natural and human, but excessive use can undercut even strong content by making the delivery sound unprepared or uncertain. Being aware of this pattern, and practicing answers out loud, helps close the gap between knowing the content and delivering it confidently."}, {"q": "Why is it generally a mistake to badmouth a previous employer or manager in an interview, even if the criticism is accurate?", "opts": ["It raises a question in the interviewer's mind about how you'd talk about THEM after you leave, regardless of how fair the original criticism was", "Interviewers always assume the candidate is lying about any negative experience", "It's illegal to discuss past employers negatively in interviews", "There's no real risk as long as the criticism is technically true"], "correct": 0, "brief": "Even fair, accurate criticism of a past employer raises an implicit question for the interviewer: if hired, how would this person describe US after they eventually leave? This concern often outweighs the validity of the original complaint, regardless of how justified it actually was."}, {"q": "What does 'active listening' generally involve, beyond just staying quiet while someone else speaks?", "opts": ["Genuinely processing what's said well enough to ask a relevant follow-up or accurately reflect it back, not just waiting for your turn to speak", "Repeating the other person's exact words verbatim every time", "Avoiding any response at all until they finish completely", "Taking detailed written notes during every conversation"], "correct": 0, "brief": "Staying silent isn't the same as actively processing what's said. Genuine active listening shows up in the QUALITY of your follow-up, asking something that proves you understood the specific point, not a generic next question that could apply to any answer at all."}, {"q": "Why might admitting 'I don't know, but I'll find out' be a stronger answer than guessing confidently when you genuinely don't know something?", "opts": ["A wrong confident guess, if later discovered, damages credibility more than an honest admission followed by a concrete commitment to follow up", "Confident guessing is always preferred regardless of accuracy", "Admitting uncertainty is considered weak in every professional context", "This principle only applies to technical interview questions"], "correct": 0, "brief": "A confidently wrong answer, especially if later discovered to be wrong, damages trust more than an honest 'I don't know, let me check' followed by an actual follow-up. Honesty paired with a concrete commitment to find the answer is generally read as more professional than false confidence."}, {"q": "What's a common reason candidates over-prepare and end up sounding rehearsed rather than natural in interviews?", "opts": ["Memorizing exact word-for-word scripts rather than internalizing the key points and structure of an answer", "Practicing answers out loud too many times in general", "Preparing too few stories or examples in advance", "Asking too many clarifying questions during the interview"], "correct": 0, "brief": "There's a real difference between knowing your key points cold and reciting a memorized script verbatim. The former allows natural variation in phrasing each time you tell it; the latter often sounds stiff or robotic, especially if the interviewer's question doesn't land in exactly the expected phrasing."}, {"q": "Why does it help to vary HOW you tell the same core story across different interview questions, rather than reusing identical phrasing?", "opts": ["Reusing identical phrasing across different questions can make a true story sound rehearsed or scripted, even though the underlying content is genuine", "Stories should always be told in the exact same words every single time", "Varying phrasing makes a story less credible, not more", "This consideration only matters for written communication"], "correct": 0, "brief": "A true story, told the exact same way every time regardless of which question prompted it, can start to sound suspiciously rehearsed, even though nothing about it is actually fabricated. Natural variation in phrasing, while keeping the core facts identical, helps a real story continue sounding real."}, {"q": "What's generally the strongest way to handle a question you didn't fully understand?", "opts": ["Ask a brief clarifying question rather than guessing at the intended meaning and answering the wrong thing confidently", "Answer immediately with your best guess at what was meant, no matter how unsure", "Stay silent and hope they rephrase it unprompted", "Change the subject to a topic you're more comfortable with"], "correct": 0, "brief": "Guessing at an unclear question risks confidently answering something entirely different from what was actually asked, which is often worse than the brief, low-cost act of asking for clarification. A short clarifying question signals careful listening, not weakness."}, {"q": "Why might pausing briefly before answering a hard question generally read better than rushing to fill the silence immediately?", "opts": ["A brief pause signals genuine thought rather than a rehearsed, instant response, and prevents rambling into an unclear answer", "Silence is always considered unprofessional in interviews and should be avoided entirely", "Rushing to answer immediately always produces clearer, better answers", "Pauses are only acceptable for technical or analytical questions"], "correct": 0, "brief": "A short pause before a genuinely hard question signals that you're actually thinking, not just retrieving a pre-loaded script. Rushing to fill silence often produces a less organized, more rambling answer than taking a beat first would have."}, {"q": "What's a reasonable way to handle a question that touches on a sensitive topic (e.g. conflict with a manager) when the actual interviewer might become that manager?", "opts": ["Answer honestly but diplomatically, focusing on resolution and respect for the manager's broader perspective, without inventing false harmony or real drama", "Claim you've never disagreed with anyone in your entire career", "Describe the most dramatic conflict you can recall in vivid detail", "Refuse to answer the question at all"], "correct": 0, "brief": "This kind of question is partly assessing how you'd handle direct feedback FROM the person asking. A diplomatic, honest answer, real but resolved, respectful of the manager's broader view, reads as far safer and more credible than either denying any disagreement ever happened or volunteering unnecessary drama."}, {"q": "Why is matching your answer's LENGTH to the weight of the question generally good practice (e.g. a quick factual question gets a short answer, a behavioral question gets more depth)?", "opts": ["Over-explaining a simple question can sound like padding, while under-explaining a complex one can sound shallow, mismatched length signals poor read of the conversation", "All interview answers should be exactly the same length regardless of the question", "Longer answers are always considered stronger regardless of the question's weight", "Length has no bearing on how an answer is perceived"], "correct": 0, "brief": "A simple factual question ('what tools do you use') answered with a five-minute monologue can feel like padding or nervousness. A genuinely complex behavioral question answered in one flat sentence can feel under-developed. Matching length to the actual weight of the question signals good conversational judgment."}, {"q": "A candidate's weakness story ends with 'and that's something I'm still actively struggling with today.' Why might this land worse than a similar story framed as an early-career lesson?", "opts": ["An unresolved, ongoing weakness raises more doubt about current performance than a specific past struggle that was clearly identified and fixed", "Ongoing struggles are always viewed more positively than resolved past ones", "There's no meaningful difference between the two framings", "Interviewers prefer weaknesses with no resolution at all"], "correct": 0, "brief": "A weakness framed as 'this is still a live, ongoing issue today' raises a more immediate doubt about current performance than the same weakness framed as 'this was true early on, here's specifically how I fixed it.' The second framing demonstrates growth; the first leaves the concern unresolved in the interviewer's mind."}, {"q": "Why might starting an answer with 'honestly,' or a similar small, natural opener, sometimes make a rehearsed-sounding answer land better?", "opts": ["A small, natural conversational opener can make the answer feel like genuine, in-the-moment reflection rather than a pre-loaded recitation", "These openers should be avoided entirely as unprofessional filler", "All interview answers should begin with a formal, structured opening phrase", "This kind of opener has no effect on how an answer is perceived"], "correct": 0, "brief": "A small, natural conversational opener can subtly signal 'this is me actually thinking, not reciting,' even when the underlying content has been thought through in advance. Used occasionally and genuinely, it can soften an otherwise polished answer into something that sounds more like real conversation."}, {"q": "What's the risk of an interview answer that's ENTIRELY about company-level facts (size, growth rate, funding) when asked 'why do you want to work here'?", "opts": ["It can sound like it could apply to literally any fast-growing company, missing the chance to connect to the SPECIFIC role's day-to-day work", "Company-level facts are always the strongest possible content for this question", "This kind of answer is impossible to give incorrectly", "Role-specific details are irrelevant to 'why this company' questions"], "correct": 0, "brief": "An answer built entirely on company trajectory (fast growth, funding, scale) could be said, almost word for word, by a candidate applying to any hot, fast-growing company. The strongest version pairs that with something specific about the ACTUAL work, grounding genuine company enthusiasm in genuine role enthusiasm too."}, {"q": "A candidate gives a strong technical answer but with very flat, monotone delivery. Why might this still hurt their overall impression, even if the content is correct?", "opts": ["Delivery and tone carry real information about confidence and genuine engagement, flat delivery can read as low energy or rehearsed disinterest regardless of content accuracy", "Delivery has zero impact on interview outcomes, only content matters", "Monotone delivery is always preferred as more professional", "This consideration only applies to sales-specific roles"], "correct": 0, "brief": "Correct content delivered with flat, low-energy tone can read as disengagement or rote memorization, even if every fact stated is accurate. Especially for client-facing or sales roles, HOW something is said carries real signal about genuine enthusiasm, not just whether the facts themselves are right."}, {"q": "Why might an interviewer specifically probe further if a candidate's 'proudest achievement' story sounds suspiciously polished and complete, with no rough edges?", "opts": ["Real achievements usually involve some genuine friction or complication; a too-clean story can read as embellished or over-rehearsed rather than authentic", "Polished stories are always preferred and should never be questioned further", "Interviewers never probe further on achievement stories regardless of polish", "Rough edges in a story always indicate the story is false"], "correct": 0, "brief": "Real achievements almost always involve some genuine friction, a setback, an uncertain moment, a complication along the way. A story that's too smooth and frictionless from start to finish can trigger suspicion that it's been smoothed over or embellished, prompting the interviewer to probe for the messier, more credible details underneath."}, {"q": "Why might pairing a strong individual-achievement story (e.g. building a tool solo) with at least one genuine team-collaboration story matter for a role explicitly requiring teamwork?", "opts": ["Relying entirely on solo-achievement stories can unintentionally suggest a default-to-solo pattern, even if the individual story itself is genuinely impressive", "Solo achievement stories are always sufficient regardless of the role's team requirements", "Team-collaboration stories are never relevant in any interview context", "This consideration only matters for very junior-level candidates"], "correct": 0, "brief": "An impressive solo-achievement story doesn't automatically prove someone collaborates well, it can even unintentionally suggest the opposite, that they default to going alone. Rounding it out with at least one genuine team-based example gives the interviewer a fuller, more balanced picture matching what the role actually requires."}, {"q": "A candidate answers 'what motivates you' entirely in terms of personal growth and learning, with no mention of outcomes for the company or customers. What's the subtle gap in that answer?", "opts": ["It can read as self-focused without connecting personal growth to value actually delivered for others, pairing both elements usually lands stronger", "Personal growth framing is always the complete, correct answer with no gaps", "Company-outcome framing is irrelevant to motivation questions", "There's no meaningful difference between these two framings"], "correct": 0, "brief": "An answer entirely about personal learning and growth, with zero connection to outcomes delivered for the company or its customers, can read as slightly self-focused. Pairing genuine personal motivation with a concrete example of value actually created for others usually produces a more complete, convincing answer."}, {"q": "Why might explicitly naming a specific number or metric in an answer (e.g. '7 qualified meetings, up from 1') generally outperform a vague claim like 'I significantly improved results'?", "opts": ["A specific, checkable number is harder to dismiss as exaggeration and gives the interviewer something concrete to remember and potentially probe further", "Vague claims are always preferred since they can't be challenged on accuracy", "Specific numbers are only relevant in technical or analytical roles", "There's no meaningful difference between vague and specific achievement claims"], "correct": 0, "brief": "'I significantly improved results' is vague enough to mean almost anything, and is easy for a skeptical interviewer to mentally discount. A specific number, even an approximate one, is harder to dismiss and gives them something concrete to remember (and possibly ask a sharp follow-up question about), which works in the candidate's favor if the number is real."}, {"q": "Why might an interviewer specifically follow up on a 'why are you leaving your current role' answer with 'what would have needed to change for you to stay'?", "opts": ["To test whether the stated reason for leaving is genuine and specific, or a generic, interchangeable answer that could apply to leaving almost any job", "This follow-up question has no diagnostic purpose and is asked at random", "The follow-up is designed to trick candidates into admitting they were forced to leave", "This question is only relevant for candidates who were terminated"], "correct": 0, "brief": "This follow-up tests whether the original answer was genuinely specific to the candidate's actual situation, or generic enough to apply to leaving almost any job. A candidate with a real, thought-through reason for leaving usually has a clear, specific answer to what would have needed to change; a vague original answer often produces an equally vague follow-up."}, {"q": "Why might a candidate intentionally choosing to ask only TWO well-chosen questions at the end of an interview, rather than five or six, sometimes be the stronger move?", "opts": ["A small number of genuinely sharp, well-considered questions often signals more focused thinking than a longer list that can feel like checking boxes", "More questions always signal more genuine interest regardless of quality", "Asking fewer than five questions is considered rude in most interview contexts", "Question quantity has no bearing on how engaged a candidate appears"], "correct": 0, "brief": "A long list of questions can sometimes feel like the candidate is working through a prepared checklist rather than genuinely curious. A small number of well-chosen, specific questions, the kind that show you've actually been thinking throughout the conversation, can land as more thoughtful than a longer, less curated list."}, {"q": "A candidate is asked about handling rejection and answers entirely in abstract terms ('rejection is part of the job, you have to stay positive') with zero concrete example. What's the risk?", "opts": ["Without a specific example, the answer is indistinguishable from generic advice anyone could repeat, regardless of whether they've actually internalized it", "Abstract answers are always preferred over example-based ones for this type of question", "There is no real risk, the abstract framing is sufficient on its own", "Concrete examples make an answer about resilience sound weaker, not stronger"], "correct": 0, "brief": "'Stay positive, it's part of the job' is true but generic enough that literally any candidate, with or without real resilience, could say it. A concrete example, a specific moment of rejection and what you actually did differently afterward, is what separates a genuinely lived answer from a recited platitude."}, {"q": "Why might describing a disagreement with a manager as 'a different point of view on priorities, resolved by explaining my reasoning and respecting their broader view' generally land better than either extreme (no conflict ever, or a dramatic conflict story)?", "opts": ["It's specific and honest without either appearing falsely conflict-free or manufacturing unnecessary drama, demonstrating real judgment in how it's framed", "Dramatic conflict stories are always the strongest possible answer to this question", "Claiming zero disagreements ever is always the safest possible answer", "This middle-ground framing is considered evasive regardless of content"], "correct": 0, "brief": "Both extremes carry risk: claiming no disagreement ever can sound unrealistic, while volunteering a dramatic conflict story can raise concern about conflict-proneness. A precise, honest middle answer, real but minor, handled through reasoning and respect for the manager's broader view, demonstrates judgment without tipping into either extreme."}, {"q": "Why might an interviewer specifically value a candidate who says 'I don't know the answer to that, but here's how I'd figure it out' over one who avoids ever admitting uncertainty?", "opts": ["It demonstrates a genuine problem-solving process, not just a desire to always appear knowledgeable, which is often more useful in an actual job than blanket confidence", "Admitting any uncertainty is always viewed as a weakness with no exceptions", "Interviewers prefer candidates who never acknowledge gaps in their knowledge", "There's no practical difference between these two response styles"], "correct": 0, "brief": "A candidate who never admits uncertainty either already knows everything (unlikely) or is uncomfortable acknowledging gaps, which is a real liability in an actual job where unknowns come up constantly. Demonstrating an actual problem-solving approach to an unknown, rather than just projecting false confidence, often signals more genuine capability."}, {"q": "A candidate's answer to 'what motivates you' and their answer to 'tell me about a time you failed' both end with nearly identical language ('that's when I realized the importance of X'). Why might a sharp interviewer notice this?", "opts": ["Repeating the exact same closing phrase across different stories can suggest a memorized template being applied generically, rather than genuinely distinct reflections", "Repeated closing phrases always strengthen the credibility of multiple different stories", "Interviewers never notice or care about phrasing patterns across separate answers", "This pattern has no bearing on how authentic the underlying stories seem"], "correct": 0, "brief": "If two genuinely different stories happen to end with the exact same phrase, almost word for word, it can suggest a memorized template ('insert story here, then state X') being applied generically, rather than each story actually producing its own distinct reflection. Sharp interviewers sometimes notice this kind of structural repetition even when they can't immediately name what felt off."}, {"q": "Why might a candidate's answer about 'how do you use data to improve performance' land stronger if it names a SPECIFIC source (e.g. 'listening to my own calls, feedback from my manager, observing top performers') rather than a general claim ('I always look at the data')?", "opts": ["Specific sources show an actual practiced habit, while a general claim could be said by anyone regardless of whether they actually do it", "General claims are always considered stronger than specific, named sources", "Specific sources are only relevant for highly technical or analytical roles", "There's no meaningful difference between these two answer styles"], "correct": 0, "brief": "'I always look at the data' is vague enough to mean almost nothing concrete. Naming actual specific sources, your own call recordings, direct manager feedback, observing specific top performers, demonstrates a real, practiced habit rather than a generic claim that anyone could make regardless of whether they actually do it."}, {"q": "A candidate uses the exact same anecdote (e.g. building an automation tool) to answer three completely different questions: biggest strength, proudest achievement, and what motivates you. What's the risk of this, even if the story itself is genuinely strong?", "opts": ["Overusing one story across many different questions can make the rest of the candidate's experience seem thin, even if that one story is excellent", "Reusing one strong story across all possible questions is always the optimal interview strategy", "There's no risk as long as the underlying story is true and impressive", "Interviewers expect and prefer the same story to be repeated across multiple questions"], "correct": 0, "brief": "Even a genuinely excellent story can start to feel like the ONLY strong example the candidate has, if it's stretched across too many different questions. Having a small set of distinct stories, each suited to a different kind of question, paints a fuller picture of someone's actual range of experience."}, {"q": "Why might explicitly stating an assumption before answering an ambiguous question ('I'll assume you mean X, let me know if you meant something different') generally be a strong move?", "opts": ["It demonstrates careful listening and gives the interviewer an easy chance to redirect if the assumption is wrong, rather than silently answering the wrong question confidently", "Stating assumptions out loud always makes a candidate sound less confident", "Ambiguous questions should always be answered without any clarification at all", "This approach is only appropriate for technical interview questions"], "correct": 0, "brief": "Silently guessing at an ambiguous question's intent and confidently answering the wrong interpretation is a common, avoidable mistake. Briefly stating the assumption out loud costs very little time and gives the interviewer an easy, low-friction way to redirect if needed, before an entire answer goes in the wrong direction."}, {"q": "A candidate gives a technically correct answer to 'how do you handle pressure' but it's entirely theoretical, with no real example from their own experience. Why might this concern an experienced interviewer more than a less polished but example-backed answer?", "opts": ["A theoretical answer with no real example can't be verified or probed further, and often signals the candidate hasn't actually faced real pressure in a way that produced a lasting lesson", "Theoretical answers are always preferred since they sound more polished", "Real examples make pressure-related answers sound weaker, not stronger", "There's no meaningful difference between theoretical and example-based answers for this question"], "correct": 0, "brief": "A theoretical, textbook-style answer ('you should stay calm and prioritize') sounds reasonable but is unfalsifiable and unmemorable. An experienced interviewer generally trusts an example-backed answer more, even if less polished, because it can be probed further and reveals whether the lesson was actually lived, not just known abstractly."}, {"q": "Why might an interviewer ask the SAME underlying question in two different ways across an interview (e.g. 'why this role' early on, then 'what would success look like for you' later)?", "opts": ["To check whether the candidate's stated motivations stay consistent across different framings, inconsistency can reveal a rehearsed rather than genuine answer", "Interviewers never deliberately repeat underlying questions in different forms", "This technique is only used to test memory, not consistency of motivation", "Asking the same underlying question twice is considered bad interview practice"], "correct": 0, "brief": "Re-asking the same underlying question in a different form is a common way to check consistency. If a candidate's stated motivation shifts meaningfully between the two framings, that can suggest the original answer was more performance than genuine reflection, while a consistent core theme across both suggests authentic, settled motivation."}, {"q": "A candidate is asked a sensitive question (e.g. about a past manager conflict) by someone who might become their actual future manager. Why is tone, not just content, particularly important here?", "opts": ["The interviewer is implicitly assessing how this person discusses authority figures and disagreement, tone signals respect and judgment independent of the specific facts described", "Tone is irrelevant as long as the factual content of the answer is accurate", "This question type should always be deflected entirely regardless of tone or content", "Only the specific facts described matter, not how they're delivered"], "correct": 0, "brief": "This question type is partly a live test, the interviewer is watching not just what happened, but HOW the candidate talks about authority and disagreement right now, in real time. Respectful, measured tone, independent of the specific facts of the story, signals the kind of judgment a future manager would want to see modeled."}, {"q": "Why might a candidate's answer about 'questions for me' actually IMPACT the interviewer's overall assessment of them, beyond just gathering information?", "opts": ["The quality and specificity of the questions asked reveals how engaged and thoughtful the candidate was throughout the entire conversation, not just at the very end", "This portion of the interview never affects overall candidate assessment", "Only the interviewer's answers matter, the candidate's questions themselves are irrelevant to evaluation", "Asking any questions at all, regardless of quality, produces the same impression"], "correct": 0, "brief": "This is one of the few moments where the candidate fully controls the topic, and the quality of question chosen reflects what they were actually paying attention to throughout the whole conversation. A sharp, specific, well-timed question can meaningfully improve an interviewer's overall impression, beyond just the information it gathers."}, {"q": "Why might over-rehearsing every single answer to the point of zero variation actually become a liability in a live conversation, compared to having key points memorized but allowing natural phrasing variation?", "opts": ["Rigid, fully memorized answers can break down or sound jarring if a question is phrased slightly differently than expected, while flexible delivery built on memorized key points adapts more naturally", "Full memorization with zero variation is always the safest, strongest approach", "Natural phrasing variation makes answers less credible, not more", "There's no practical difference between fully scripted and flexibly delivered answers"], "correct": 0, "brief": "A fully memorized, rigid answer can become jarring or break down entirely if the actual question is phrased even slightly differently than rehearsed. Internalizing the key points and structure, while allowing natural variation in exact wording each time, produces an answer that adapts smoothly to however the question actually gets asked live."}, {"q": "A candidate's strongest stories all happen to be about their own individual initiative, with managers or teammates appearing only as background detail. What subtle signal might this collectively send across an entire interview?", "opts": ["Even if each individual story is strong, the pattern across ALL of them can suggest a default-to-solo orientation, worth deliberately balancing with stories where collaboration was central, not incidental", "Individual-initiative stories are always sufficient and require no balancing across an interview", "This pattern has no cumulative effect across multiple separate stories", "Interviewers only evaluate stories individually, never as a pattern across a conversation"], "correct": 0, "brief": "A single strong individual-initiative story is fine, even excellent. But if EVERY story across an entire interview follows the same solo pattern, the cumulative signal can become 'this person defaults to working alone,' even if that wasn't the intended message of any single story on its own. Deliberately including at least one genuinely collaborative story balances that overall impression."}, {"q": "Why might briefly restating a question back in your own words before answering ('so you're asking how I'd handle X specifically') sometimes be a useful technique for harder questions?", "opts": ["It confirms you understood the actual question correctly before committing to a full answer, and buys a brief moment to organize your thoughts without awkward silence", "Restating questions always makes a candidate sound less intelligent or less prepared", "This technique should be avoided entirely as it wastes valuable interview time", "Restating a question has no functional purpose beyond filling silence"], "correct": 0, "brief": "Briefly restating a complex or ambiguous question serves two real purposes: it confirms your understanding is correct before you commit to a full answer, and it gives you a natural, non-awkward moment to organize your thoughts, which is generally preferable to either rushing into a possibly-wrong answer or sitting in silence."}, {"q": "Why might a candidate intentionally slow down their speaking pace slightly when answering a particularly important question?", "opts": ["Slowing down on key moments signals deliberate emphasis and confidence, rather than rushing through important content as if eager to move past it", "Speaking pace has no effect on how content is perceived in interviews", "Faster speech is always preferred regardless of the question's importance", "This technique only matters for non-native speakers, not native speakers"], "correct": 0, "brief": "Rushing through an important point can unintentionally signal nervousness or a desire to get past a topic quickly. Deliberately slowing down slightly on a key sentence, the actual number, the actual lesson learned, can signal confidence and give the content room to actually land with the listener."}, {"q": "A candidate answers 'why this role' with enthusiasm about the company's mission, but shows no specific knowledge of what the day-to-day work actually involves. What gap does this reveal?", "opts": ["Enthusiasm about mission alone doesn't prove understanding of the actual job, pairing both shows genuine, informed interest rather than surface-level excitement", "Mission-based enthusiasm is always sufficient on its own for this question", "Day-to-day job knowledge is irrelevant to 'why this role' questions", "There's no meaningful gap between mission enthusiasm and role understanding"], "correct": 0, "brief": "Genuine mission enthusiasm is good, but on its own it doesn't distinguish a well-researched candidate from someone who read the company's About page once. Demonstrating specific understanding of the actual day-to-day work, alongside mission enthusiasm, shows the interest is informed and real, not just surface-level excitement about a cause."}, {"q": "Why might using the interviewer's own previously-stated language (e.g. a phrase Conor used earlier in the call) later in your own answer be an effective, subtle technique?", "opts": ["It signals you were genuinely listening earlier in the conversation, not just waiting for your turn to speak, and creates a sense of shared understanding", "Using an interviewer's own words back at them is always perceived as manipulative or insincere", "This technique has no measurable effect on how engaged a candidate seems", "Repeating an interviewer's phrasing should always be avoided entirely"], "correct": 0, "brief": "Naturally incorporating something the interviewer said earlier (not parroting it obviously, but genuinely building on it) signals real attentiveness throughout the conversation, not just during your own speaking turns. Used genuinely rather than mechanically, it can create a real sense of connection and shared context."}, {"q": "Why might a candidate's body language and tone matter even in a phone-only interview, where there's no video?", "opts": ["Tone, pacing, and energy still carry through audio alone, and a flat or distracted vocal delivery is noticeable even without visual cues", "Body language and tone are completely irrelevant in audio-only interviews", "Phone interviews are evaluated purely on word content, with zero attention to delivery", "There's no measurable difference between video and audio-only interview performance"], "correct": 0, "brief": "Even without video, vocal tone, energy, pacing, and engagement come through clearly on a phone call. A distracted or flat vocal delivery is just as noticeable in audio as a disengaged posture would be on video, the channel changes, but the underlying signal of genuine engagement still needs to be present."}, {"q": "A candidate says 'I always do X' as an absolute claim about their own behavior. Why might a slightly softer phrasing ('I usually do X, especially when Y') sometimes be more credible?", "opts": ["Absolute claims ('always,' 'never') are easy to mentally challenge and can sound less self-aware than a nuanced claim that acknowledges real-world variation", "Absolute claims are always more persuasive and should be used whenever possible", "Softer phrasing always signals weakness or lack of confidence", "There's no meaningful difference between absolute and nuanced behavioral claims"], "correct": 0, "brief": "Absolute claims ('I ALWAYS stay calm under pressure') are easy for a skeptical listener to mentally challenge, since almost nobody is genuinely consistent 100% of the time. A nuanced claim that acknowledges real variation ('usually, especially when...') often reads as more self-aware and, paradoxically, more confident than an unrealistic absolute."}, {"q": "Why might ending an answer with a brief, confident statement rather than trailing off uncertainly matter, even if the content itself was strong throughout?", "opts": ["A weak or uncertain ending can retroactively make even strong content feel less convincing, since the LAST thing said often shapes the overall impression most strongly", "Endings have no measurable effect on how an entire answer is perceived", "Trailing off uncertainly at the end always signals appropriate humility", "Only the beginning of an answer matters for overall impression"], "correct": 0, "brief": "There's a real recency effect in how people process spoken answers, the ending often shapes the overall impression disproportionately, even when earlier content was equally strong. An answer that trails off uncertainly at the end ('...so, yeah, I guess that's kind of it') can undercut otherwise solid content that came before it."}, {"q": "Why might a candidate deliberately avoid using buzzwords or jargon they don't genuinely understand, even if those terms appeared in the job posting?", "opts": ["A follow-up question testing genuine understanding of a buzzword used without real comprehension can expose a gap that honest, plain language would have avoided entirely", "Using job-posting buzzwords always strengthens an answer regardless of genuine understanding", "Jargon should always be used as much as possible to sound knowledgeable", "Interviewers never probe further on terminology used by candidates"], "correct": 0, "brief": "Dropping a buzzword from the job posting (like 'pipeline velocity' or 'stage discipline') without genuinely understanding it is risky, a simple follow-up question testing real comprehension can expose the gap immediately. Using plain, accurate language you genuinely understand is safer than reaching for jargon that sounds impressive but isn't backed by real depth."}, {"q": "Why might it help to have 2-3 flexible 'anchor stories' ready, rather than one rigid story per possible question, heading into an unpredictable interview?", "opts": ["A small set of flexible stories can stretch to answer many different questions naturally, while a rigid one-story-per-question approach breaks down the moment an unexpected question appears", "Having exactly one prepared story per possible question is always the optimal strategy", "Flexible stories are always less credible than rigid, single-purpose ones", "Anchor stories have no practical value in unpredictable interview settings"], "correct": 0, "brief": "No candidate can predict every exact question in advance. A small set of genuinely flexible stories, ones that can stretch to answer multiple different question types depending on which angle is emphasized, holds up much better against unpredictable interviews than a rigid one-story-per-question approach that breaks down the moment something unexpected is asked."}, {"q": "Why might briefly acknowledging nervousness honestly ('I'll admit, I'm a little nervous, but excited for this') sometimes work better than trying to hide it entirely?", "opts": ["A brief, honest acknowledgment can release tension and read as authentic, while visibly failing to hide nervousness without addressing it can read as more awkward", "Nervousness should never be mentioned under any circumstances in a professional interview", "Hiding nervousness completely is always achievable with enough practice", "Acknowledging nervousness always weakens a candidate's overall impression"], "correct": 0, "brief": "Visible nervousness that goes unacknowledged can create an awkward, unaddressed tension in the room. A brief, light, honest acknowledgment, used sparingly and not repeatedly, can actually release some of that tension and read as authentic self-awareness, rather than a polished but transparently fake confidence."}, {"q": "Why is it generally considered stronger to answer 'what does success look like for you' with something MEASURABLE rather than purely emotional or vague language?", "opts": ["A measurable answer (a specific number, outcome, or milestone) is concrete enough to be revisited and evaluated later, while vague language ('feeling fulfilled') is impossible to check against later performance", "Vague, emotional language is always preferred for this specific question", "Measurable answers are only appropriate for technical or analytical roles", "There's no meaningful difference between measurable and vague answers to this question"], "correct": 0, "brief": "A vague answer ('success means feeling fulfilled and growing') sounds nice but can't be checked against anything concrete later. A measurable answer (a specific target, milestone, or outcome) gives both the candidate and the manager something real to revisit during actual performance conversations down the line, which is part of why it lands as a stronger, more serious answer."}], "required_skills": [{"q": "What does CRM stand for?", "opts": ["Customer Relationship Management", "Company Revenue Model", "Client Retention Metrics", "Customer Reporting Module"], "correct": 0, "brief": "CRM stands for Customer Relationship Management, the system that tracks every account, contact, deal stage, and interaction history. In an SDR role, the CRM is the single source of truth, if something isn't logged there, it effectively doesn't exist for reporting or follow-up purposes."}, {"q": "What is the typical purpose of LinkedIn Sales Navigator in outbound prospecting?", "opts": ["Finding and filtering the right prospects/companies to target", "Running email campaigns automatically", "Processing payroll for international hires", "Tracking customer support tickets"], "correct": 0, "brief": "Sales Navigator is built specifically for finding and filtering prospects, by company size, industry, title, seniority, and more advanced signals like recent activity or buyer intent. It's a research and targeting tool, not an outreach or payroll tool."}, {"q": "What does 'connect rate' measure in cold calling?", "opts": ["The percentage of calls where you actually reach a live person", "The percentage of emails that get opened", "The number of meetings booked per week", "The total number of accounts in your pipeline"], "correct": 0, "brief": "Connect rate is the percentage of dials that result in an actual live conversation, not voicemail, not a wrong number, not no answer. A realistic connect rate on cold lists is typically 5-15%, depending heavily on list quality and time of day."}, {"q": "What is an ICP, and why does it matter before building a prospect list?", "opts": ["Ideal Customer Profile, defining who you're actually targeting before researching specific accounts", "Internal Compliance Procedure, a legal requirement before outreach", "Initial Contact Point, the first person you call at any company", "Industry Coverage Plan, a marketing budget document"], "correct": 0, "brief": "ICP stands for Ideal Customer Profile, the defined picture of who you're actually trying to reach (industry, company size, geography, likely pain points, decision-maker title) before you start building a list. Skipping this step usually means wasted time on accounts that were never a good fit to begin with."}, {"q": "What does 'data hygiene' mean in a CRM context?", "opts": ["Keeping records accurate, current, and free of duplicate or stale information", "Deleting all old records every month", "Encrypting customer data for security", "Backing up the CRM database daily"], "correct": 0, "brief": "Data hygiene means keeping CRM records accurate and current, correct stage, correct next action, no duplicate entries, no stale information er research-adjacent behavior) suggest someone is actively in a research phase relevant to what you're selling. It's not a guarantee of purchase, but it's a much stronger prioritization signal than a cold, unverified contact with zero such signals."}, {"q": "What is the basic purpose of A/B testing in email outreach?", "opts": ["Comparing two versions of a message to see which performs better on a measurable metric like reply rate", "Sending the same email twice to the same person", "Testing whether an email server is working correctly", "Verifying a contact's email address is valid"], "correct": 0, "brief": "A/B testing means sending two different versions of a message (different subject line, different opening line, etc.) to comparable groups, then measuring which performs better on a specific metric, like open rate or reply rate. It replaces guessing about what works with actual evidence from real prospect behavior."}, {"q": "What is the general purpose of a 'follow-up cadence'?", "opts": ["A planned schedule for how often and through which channels you re-contact a prospect who hasn't yet responded", "A legal requirement for contacting prospects a minimum number of times", "A single follow-up email sent exactly once", "A report showing how many follow-ups were sent last month"], "correct": 0, "brief": "A follow-up cadence is a planned schedule (e.g. day 1 email, day 3 LinkedIn message, day 7 call) for re-engaging a prospect who hasn't responded yet. Without a defined cadence, follow-up becomes inconsistent and easy to forget, especially across a large volume of active prospects."}, {"q": "Why is tracking 'next action' on every single CRM record considered important?", "opts": ["Without a clear next action, deals and leads silently stall with nobody noticing until it's too late to revive them easily", "Next action tracking is only relevant for very large companies", "CRM records don't need a next action if the deal is in an early stage", "Next action tracking is at does it generally mean to 'revive a stale opportunity' in pipeline management?", "opts": ["Re-engaging a deal or lead that's gone quiet for an extended period, rather than letting it sit untouched indefinitely", "Deleting old deals from the CRM permanently", "Automatically closing any deal that's been open for over 30 days", "Reassigning every stale deal to a different salesperson"], "correct": 0, "brief": "A stale opportunity is one that's gone quiet, no recent activity, no response, no movement, for longer than is healthy. Reviving it means proactively re-engaging rather than letting it silently die in the pipeline, often through a fresh angle, new piece of information, or simple check-in rather than repeating the same approach that already stalled."}, {"q": "A rep's connect rate suddenly drops from 12% to 4% over one week, using the exact same list. What's the most likely FIRST thing to investigate?", "opts": ["Whether calling time-of-day shifted, or whether the calling numbers are getting flagged as spam/scam by carriers", "Whether the list itself needs to be completely replaced immediately", "Whether the prospects on the list all changed jobs simultaneously", "Nothing, this kind of fluctuation is always meaningless random variance"], "correct": 0, "brief": "A sudden, sharp drop with the SAME list usually points to a calling-time shift or a carrier/spam-flagging issue on the calling numbers themselves, not a sudden change in the prospects. Investigating the calling conditions first, before assuming the list itself is suddenly bad, is the more efficient diagnostic path."}, {"q": "If your target is 5 qualified meetings a month and your conversation-to-meeting conversion rate is 20%, roughly how many real conversations do you need per month?", "opts": ["25", "10", "50", "100"], "correct": 0, "brief": "5 divided by 0.20 (20%) equals 25 real conversations needed per month to reach that target, assuming the conversion rate holds steady. This kind of quick funnel math is a basic but important skill for understanding whether your current activity level is actually sufficient to hit a stated target."}, {"q": "A rep has high conversation-to-meeting conversion (25%, above benchmark) but poor meeting-to-opportunity conversion with the AE. What does this combination most likely indicate?", "opts": ["The rep may be over-qualifying loosely, booking meetings that look good on paper but lack real fit once the AE digs in", "The AE is definitely underperforming and should be replaced", "This combination is statistically impossible and indicates a data error", "Nothing meaningful, the two metrics are entirely unrelated to each other"], "correct": 0, "brief": "A high booking rate paired with weak downstream conversion is a classic sign of loose qualification, the meetings count as 'booked' on paper, but don't hold up once a more rigorous AE conversation tests the actual fit. This combination should prompt a review of qualification criteria, not just blame placed on the AE."}, {"q": "Why might researching a prospect's RECENT funding round (e.g. a Series B closed last month) be specifically useful before an outbound call?", "opts": ["Fresh funding often signals aggressive upcoming hiring/expansion plans, which is exactly the kind of timing signal that makes outreach more relevant", "Funding rounds have no relationship to hiring or expansion timing", "This kind of research is only relevant for publicly traded companies", "Recent funding always means a company has no budget for new vendors"], "correct": 0, "brief": "A recent funding round is a strong timing signal, companies typically use new capital to scale, often including international hiring they haven't fully planned the compliance/payroll side of yet. Referencing this kind of real, researched context (without being intrusive about it) makes outreach feel relevant rather than generic."}, {"q": "What's the risk of using the EXACT same outreach message, with zero personalization, across an eals but weak hygiene on older ones often reveals a real, specific gap, the habit of careful initial entry exists, but there's no regular REVIEW and cleanup cadence for things that have been sitting for a while. This is exactly why a recurring pipeline review habit, not just careful initial entry, is treated as a distinct, necessary skill."}, {"q": "Why might a manager specifically value a candidate who says 'I check three things every morning: what's stalled, what's gone quiet, what's close to converting' over one who says 'I just work through my list in order'?", "opts": ["A prioritized, signal-based approach to starting the day shows more deliberate ownership than a purely sequential, order-based approach with no real prioritization logic", "Working through a list strictly in order is always the more disciplined, professional approach", "There's no meaningful difference between these two stated approaches", "Prioritization frameworks are only relevant for senior-level roles, not day-to-day execution"], "correct": 0, "brief": "Working strictly in list order treats every record as equally urgent, regardless of actual signal. A prioritized, signal-based approach (stalled accounts, quiet leads, near-conversion deals get checked first) shows real ownership and judgment about where attention is actually most valuable each day, rather than mechanical, undifferentiated execution."}, {"q": "What's a realistic, honest way to handle a tool gap (e.g. a job requires Pipedrive specifically, but you've only used Zoho/Apollo) in an interview, rather than either overclaiming or being evasive?", "opts": ["State the gap directly and confidently, then bridge it by emphasizing the underlying transferable discipline (CRM hygiene, pipeline management) rather than the specific tool name", "Claim direct Pipedrive experience even if you've never actually used it", "Avoid mentioning the specific tool at all and hope it doesn't come up", "Apologize extensively for not having used the exact const SECTION_META = {
  deel_knowledge: { label: "Deel Knowledge", icon: "🏢" },
  sales_methods: { label: "Sales Methods", icon: "🎯" },
  communication_skills: { label: "Communication Skills", icon: "💬" },
  required_skills: { label: "Required Skills", icon: "🛠️" }
};

let progress = JSON.parse(localStorage.getItem('deelQuizProgress') || '{}');
let currentSectionKey = null;
let currentIndex = 0;
let currentScore = 0;
let answered = false;

function saveProgress() {
  localStorage.setItem('deelQuizProgress', JSON.stringify(progress));
}

function getSectionProgress(key) {
  return progress[key] || { bestScore: 0, completed: false };
}

function difficultyForIndex(idx, total) {
  const pct = idx / total;
  if (pct < 0.34) return 'easy';
  if (pct < 0.7) return 'medium';
  return 'hard';
}

function renderSectionGrid() {
  const grid = document.getElementById('sectionGrid');
  grid.innerHTML = Object.keys(SECTIONS_DATA).map(key => {
    const meta = SECTION_META[key];
    const data = SECTIONS_DATA[key];
    const prog = getSectionProgress(key);
    const pct = prog.bestScore ? Math.round((prog.bestScore / data.length) * 100) : 0;
    return `
      <div class="section-card" onclick="openSection('${key}')">
        <div class="sec-title">${meta.icon} ${meta.label}</div>
        <div class="sec-meta">${data.length} questions ${prog.bestScore ? '&middot; Best: ' + prog.bestScore + '/' + data.length : '&middot; Not started'}</div>
        <div class="sec-progress-bar"><div class="sec-progress-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

function openSection(key) {
  currentSectionKey = key;
  currentIndex = 0;
  currentScore = 0;
  showScreen('screen-quiz');
  document.getElementById('sectionTitle').textContent = SECTION_META[key].icon + ' ' + SECTION_META[key].label;
  showQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  renderSectionGrid();
  showScreen('screen-home');
}

function showQuestion() {
  answered = false;
  const data = SECTIONS_DATA[currentSectionKey];
  const q = data[currentIndex];
  const diff = difficultyForIndex(currentIndex, data.length);

  document.getElementById('quizProgressText').textContent = (currentIndex + 1) + ' / ' + data.length;
  document.getElementById('quizProgressFill').style.width = ((currentIndex) / data.length * 100) + '%';

  const diffPill = document.getElementById('diffPill');
  diffPill.textContent = diff;
  diffPill.className = 'difficulty-pill diff-' + diff;

  document.getElementById('qText').textContent = q.q;

  const optsEl = document.getElementById('optionsContainer');
  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    optsEl.appendChild(btn);
  });

  document.getElementById('feedbackBanner').className = 'feedback-banner';
  document.getElementById('briefBox').className = 'brief-box';
  document.getElementById('nextBtn').className = 'next-btn';
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const data = SECTIONS_DATA[currentSectionKey];
  const q = data[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const feedback = document.getElementById('feedbackBanner');
  const briefBox = document.getElementById('briefBox');
  const briefText = document.getElementById('briefText');

  if (idx === q.correct) {
    buttons[idx].classList.add('correct-answer');
    feedback.textContent = '✓ Correct!';
    feedback.className = 'feedback-banner show correct';
    currentScore++;
  } else {
    buttons[idx].classList.add('wrong-answer');
    buttons[q.correct].classList.add('correct-answer');
    feedback.textContent = '✗ Not quite';
    feedback.className = 'feedback-banner show wrong';
    briefText.textContent = q.brief;
    briefBox.className = 'brief-box show';
  }

  document.getElementById('nextBtn').className = 'next-btn show';
  document.getElementById('headerStreak').textContent = currentScore + ' correct this round';
}

function nextQuestion() {
  const data = SECTIONS_DATA[currentSectionKey];
  currentIndex++;
  if (currentIndex >= data.length) {
    finishSection();
    return;
  }
  showQuestion();
}

function finishSection() {
  const data = SECTIONS_DATA[currentSectionKey];
  const prog = getSectionProgress(currentSectionKey);
  if (currentScore > prog.bestScore) prog.bestScore = currentScore;
  prog.completed = true;
  progress[currentSectionKey] = prog;
  saveProgress();

  document.getElementById('completeScoreLine').textContent =
    'You scored ' + currentScore + ' out of ' + data.length + ' (' + Math.round(currentScore/data.length*100) + '%)';
  showScreen('screen-complete');
}

function restartSection() {
  currentIndex = 0;
  currentScore = 0;
  showScreen('screen-quiz');
  showQuestion();
}

renderSectionGrid();
</script>
